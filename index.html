<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOA Club House</title>
    <!-- Подключаем библиотеку Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            background-color: #121212; /* Темный фон */
            color: #d4af37; /* Золотой цвет текста */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 30px;
            border-radius: 20px;
            background: #1c1c1c;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 80%;
        }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        p { color: #ffffff; font-size: 1.1em; }
        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #d4af37;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sons of Anarchy</h1>
        <p>Добро пожаловать в клубный дом, <span id="username">брат</span>.</p>
        <button class="btn" onclick="tg.close()">Покинуть штаб</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        // Разворачиваем на максимум
        tg.expand();

        // Показываем имя пользователя из Telegram, если оно доступно
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
