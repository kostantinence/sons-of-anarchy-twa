<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOA Matrix Final</title>
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .ui { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; height: 100%; pointer-events: none; }
        .card { 
            background: rgba(0, 0, 0, 0.85); border: 2px solid #d4af37; 
            padding: 25px; border-radius: 20px; text-align: center; color: #d4af37;
            width: 280px; pointer-events: auto; box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }
        h1 { margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #fff; margin: 15px 0; font-size: 16px; }
        .btn { 
            background: #d4af37; border: none; padding: 12px; width: 100%; 
            font-weight: bold; border-radius: 10px; cursor: pointer; color: #000; 
            text-transform: uppercase; margin-top: 10px;
        }
    </style>
</head>
<body>

<canvas id="m"></canvas>

<div class="ui">
    <div class="card">
        <h1>SONS OF ANARCHY</h1>
        <p>Добро пожаловать, <br><b id="u" style="color:#d4af37">Странник</b></p>
        <button class="btn" onclick="window.Telegram.WebApp.close()">ПОКИНУТЬ КЛУБ</button>
    </div>
</div>

<script>
    var canvas = document.getElementById("m");
    var ctx = canvas.getContext("2d");
    var w, h, columns, drops;
    var fontSize = 18;
    var speed = 110; 
    var katakana = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン0123456789";
    var chars = katakana.split("");

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        columns = Math.floor(w / fontSize);
        drops = [];
        for (var i = 0; i < columns; i++) drops[i] = 1;
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
        ctx.fillRect(0, 0, w, h);
        ctx.font = fontSize + "px monospace";
        for (var i = 0; i < drops.length; i++) {
            var txt = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillStyle = Math.random() > 0.96 ? "#fff" : "#0f0";
            ctx.fillText(txt, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
        setTimeout(function() { requestAnimationFrame(draw); }, speed);
    }

    try {
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('u').innerText = tg.initDataUnsafe.user.first_name;
        }
    } catch(e) {}

    window.addEventListener("resize", init);
    init();
    draw();
</script>
</body>
</html>
