<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SON - Sons Of Anarchy</title>
    
    <!-- Настройки для отображения превью в Telegram -->
    <meta property="og:title" content="SON - Sons Of Anarchy">
    <meta property="og:description" content="Внутреннее объявление союза">
    <!-- Замените 'ваш-логин' на свой ник в GitHub ниже -->
    <meta property="og:image" content="https://github.io">
    <meta property="og:type" content="website">

    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background: #000; font-family: monospace; color: #d4af37; overflow-x: hidden; }
        
        /* СЛОЙ 1: JavaScript Матрица */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* СЛОЙ 2: Фотография (из вашего репозитория) */
        .bg-photo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.webp') no-repeat center center; 
            background-size: cover; 
            opacity: 0.4; 
            z-index: 2; 
            pointer-events: none;
        }

        /* СЛОЙ 3: Интерфейс */
        .ui { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
   .card .expandable-box {
    background: rgb(0 0 0 / 60%);
    border: 2px solid #cec09487;
    padding: 15px 20px;
    border-radius: 20px;
    text-align: center;
    width: 280px;
    box-shadow: 0 0 25px rgb(215 201 155 / 40%);
    margin-bottom: 20px;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    cursor: pointer;
    
    /* ВАЖНО: Начальная высота, чтобы было видно только заголовок */
    max-height: 50px; 
}

  .card-header {
    background: rgb(0 0 0 / 50%);
    border: 2px solid #d4af3787;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    font-family: serif;
    margin-bottom: 20px; /* Отступ от нижнего блока */
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
    display: inline-block; /* Рамка по размеру текста */
}

        h1 { margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        h2 { font-size: 16px; margin: 10px 0; border-bottom: 1px solid #d4af37; padding-bottom: 5px; }
        p { color: #fff; margin: 10px 0; font-size: 14px; line-height: 1.4; }

          /* анимация бегающей строки h1 */
        .txt {
  position: relative;
  overflow: hidden;
  background: linear-gradient(90deg, #b29841bf 10%, #a68137d4 20%);
  background-repeat: no-repeat;
  background-size: 80%;
  animation: animate 6s linear infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: rgb(222 215 20 / 85%);
}

@keyframes animate {
  0% {
    background-position: -500%;
  }
  100% {
    background-position: 500%;
  }
}
         /* Состояние при раскрытии */
.expandable-box.is-expanded {
    max-height: 800px; /* Раскрываем */
    background: rgb(0 0 0 / 60%); /* Делаем фон плотнее при раскрытии */
    border-color: #d4af37;
    cursor: default;
}

.content {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    padding-top: 10px;
}

.is-expanded .content {
    opacity: 1;
    pointer-events: auto;
}

/* мерцание рамки */
/* Описываем саму анимацию */
@keyframes goldPulse {
  0% {
    box-shadow: 0 0 15px rgb(236 229 207 / 30%);
    border-color: rgb(255 254 249 / 50%);
}

50% {
    box-shadow: 0 0 30px rgb(226 216 185 / 70%);
    border-color: rgb(216 209 187);
}
100% {
    box-shadow: 0 0 15px rgb(234 227 205 / 30%);
    border-color: rgb(234 222 184 / 50%);
}
}

/* Применяем её к верхней рамке */
.card-header {
  animation: goldPulse 4s infinite ease-in-out;
}

/* Применяем её к нижней рамке (когда она закрыта) */
.expandable-box {
  animation: goldPulse 4s infinite ease-in-out;
}

/* Отключаем пульсацию, когда рамка раскрыта, чтобы не отвлекать от текста */
.expandable-box.is-expanded {
  animation: none; 
  border-color: #d4af37;
  box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
}

/* Стили кнопок под золото */
.static-btn, #run-btn {
    padding: 10px 25px;
    border: 2px solid #d4af37;
    background: rgba(0, 0, 0, 0.7);
    color: #d4af37;
    font-family: monospace;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    z-index: 1000;
}

#run-btn {
    position: relative; /* Теперь она стоит в ряду с кнопкой НЕТ */
    transition: all 0.1s ease-out;
    display: inline-block;
}

.static-btn:hover {
    background: #d4af37;
    color: #000;
}

.insult-text {
    position: fixed;
    color: #ff4d4d; /* Красный цвет для контраста с золотом */
    font-family: monospace;
    font-weight: bold;
    text-shadow: 0 0 10px #ff0000;
    pointer-events: none;
    z-index: 2000;
    text-transform: uppercase;
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
}

#critical-alert {
    display: none; /* Скрыто по умолчанию */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    background: rgba(40, 0, 0, 0.9); /* Темно-красный фон */
    border: 3px solid #ff4d4d;
    color: #ff4d4d;
    padding: 20px;
    text-align: center;
    z-index: 3000;
    font-family: monospace;
    box-shadow: 0 0 50px #ff0000;
}

#critical-alert h3 {
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#critical-alert button {
    margin-top: 15px;
    background: #ff4d4d;
    color: #000;
    border: none;
    padding: 8px 20px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
}

    </style>
</head>
<body>

<canvas id="m"></canvas>
<div class="bg-photo"></div>

<div class="ui">
    <!-- Первая карточка: Заголовок -->
    <div class="card card-header">
        <h1 class="txt">SONS OF ANARCHY</h1>
    </div>

    <!-- Вторая карточка: Опрос -->
<div class="expandable-box is-expanded" style="cursor: default; max-height: none;">
    <div id="poll-content">
        <h2>Планируете ли вы перелетать на другой сервер?</h2>
        <div class="content" style="opacity: 1; pointer-events: auto; display: flex; justify-content: center; gap: 20px; height: 100px; align-items: center;">
            <button id="no-btn" class="static-btn">НЕТ</button>
            <button id="run-btn">ДА</button>
        </div>
    </div>
</div>

    </div>
</div>

<div id="critical-alert">
    <h3>SYSTEM FAILURE</h3>
    <p>Кряковая ошибка</p>
    <button onclick="document.getElementById('critical-alert').style.display='none'">Перезагрузить Кря</button>
</div>

<script>
    // JS МАТРИЦА (Фоновая анимация)
    var canvas = document.getElementById("m");
    var ctx = canvas.getContext("2d");
    var w, h, columns, drops;
    var fontSize = 18;
    var chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        columns = Math.floor(w / fontSize);
        drops = [];
        for (var i = 0; i < columns; i++) drops[i] = 1;
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
        ctx.fillRect(0, 0, w, h);
        ctx.font = fontSize + "px monospace";
        for (var i = 0; i < drops.length; i++) {
            var txt = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillStyle = Math.random() > 0.96 ? "#fff" : "#0f0";
            ctx.fillText(txt, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
        setTimeout(function() { requestAnimationFrame(draw); }, 100);
    }

    window.addEventListener("resize", init);
    init();
    draw();
</script>
<script>
const box = document.getElementById('expandableBox');

box.addEventListener('click', (e) => {
    // Останавливаем передачу клика документу
    e.stopPropagation(); 
    box.classList.add('is-expanded');
});

document.addEventListener('click', (e) => {
    // Если клик вне бокса — закрываем
    if (!box.contains(e.target)) {
        box.classList.remove('is-expanded');
    }
});
</script>
<script>
    const runBtn = document.getElementById('run-btn');
const insults = [
    "Ошибка доступа",
    "System Error: Skill Issues",
    "Доступ запрещен",
    "404: Скорость не найдена"
];

function showInsult(x, y) {
    const text = document.createElement('div');
    text.className = 'insult-text';
    text.style.left = x + 'px';
    text.style.top = y + 'px';
    text.innerText = insults[Math.floor(Math.random() * insults.length)];
    document.body.appendChild(text);

    // Удаляем элемент после анимации
    setTimeout(() => text.remove(), 1000);
}

function moveButton(e) {
    const clientX = e.type.includes('touch') ? e.touches.clientX : e.clientX;
    const clientY = e.type.includes('touch') ? e.touches.clientY : e.clientY;

    const rect = runBtn.getBoundingClientRect();
    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(clientX - btnCenterX, clientY - btnCenterY);

    if (distance < 100) {
        // КЛЮЧЕВОЙ МОМЕНТ: при первом приближении делаем её "летающей"
        if (runBtn.style.position !== 'fixed') {
            runBtn.style.position = 'fixed';
        }

        const x = Math.random() * (window.innerWidth - rect.width - 60) + 30;
        const y = Math.random() * (window.innerHeight - rect.height - 60) + 30;

        runBtn.style.left = x + 'px';
        runBtn.style.top = y + 'px';

        showInsult(clientX, clientY);
    }
}

document.addEventListener('mousemove', moveButton);
document.addEventListener('touchstart', moveButton, {passive: false});
document.addEventListener('touchmove', moveButton, {passive: false});

runBtn.addEventListener('click', (e) => {
    e.preventDefault();
    // Показываем наше кастомное окно вместо стандартного alert
    document.getElementById('critical-alert').style.display = 'block';
    
    // Можно еще добавить звук ошибки или заставить кнопку прыгнуть еще раз
    const x = Math.random() * (window.innerWidth - runBtn.clientWidth - 60) + 30;
    const y = Math.random() * (window.innerHeight - runBtn.clientHeight - 60) + 30;
    runBtn.style.left = x + 'px';
    runBtn.style.top = y + 'px';
});

const noBtn = document.getElementById('no-btn');
const pollContent = document.getElementById('poll-content');

noBtn.addEventListener('click', () => {
    // Включаем мерцание фона
    document.body.classList.add('flash-active');
    
    // Эффектно меняем текст внутри блока
    pollContent.style.opacity = '0';
    
    setTimeout(() => {
        pollContent.innerHTML = `
            <h2 style="color: #d4af37; font-size: 20px; animation: animate 2s linear infinite;">Тогда будем Кря кря!</h2>
            <p style="color: #fff; font-weight: bold;">Крякать на Клокера))</p>
        `;
        pollContent.style.opacity = '1';
        pollContent.style.transition = 'opacity 0.5s ease';
        
        // Убираем класс мерцания после завершения
        setTimeout(() => {
            document.body.classList.remove('flash-active');
        }, 800);
    }, 400);
});
    </script>
</body>
</html>
